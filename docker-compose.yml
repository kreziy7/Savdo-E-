version: "3.9"

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: savdo_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: savdo_db
    volumes:
      - mongo_data:/data/db
    networks:
      - savdo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: savdo_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/savdo_db
      JWT_SECRET: ${JWT_SECRET:-savdo_super_secret_jwt_key_2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-savdo_refresh_secret_key_2026}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      ADMIN_SETUP_KEY: ${ADMIN_SETUP_KEY:-savdo_admin_setup_2026}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-savdo_super_secret_jwt_key_2026}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-24h}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-825239798783-l1lteibkgtf34v4afme0g4qe4avhrgft.apps.googleusercontent.com}
    ports:
      - "5000:5000"
    networks:
      - savdo_net

  # ── Web Frontend ──────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_ADMIN_URL: http://localhost:3001
    container_name: savdo_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - savdo_net

  # ── Admin Panel ───────────────────────────────────────────────────────────
  admin:
    build:
      context: ./web/admin
      dockerfile: Dockerfile
    container_name: savdo_admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:80"
    networks:
      - savdo_net

volumes:
  mongo_data:
    name: savdo_mongo_data

networks:
  savdo_net:
    name: savdo_network
    driver: bridge
